name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test project files
        run: |
          python -c "import pandas as pd; pd.read_csv('mahasiswa.csv'); pd.read_csv('mata_kuliah.csv'); pd.read_csv('jadwal.csv'); print('CSV OK')"

